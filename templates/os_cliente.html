{% extends "base.html" %}
{% block content %}
<div class="panel">
  <div class="panel-h">
    <h1>Abrir OS</h1>
    <div class="badge">{{ v.placa }} • {{ v.marca }} {{ v.modelo }} {{ v.ano }} • {{ v.cor }}</div>
  </div>
  <div class="panel-b">
    <div class="card" style="max-width:820px">
      <form method="post" action="/os/abrir">
        <input type="hidden" name="placa" value="{{ v.placa }}">
        <label>Cliente</label>
		<select name="cliente_id" style="width:100%;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,.12);background:#0b2238;color:#ffffff;">
          <option value="">-- selecione --</option>
          {% for c in clientes %}
            <option value="{{ c.id }}">{{ c.nome }} ({{ c.telefone }})</option>
          {% endfor %}
        </select>

        <div style="height:10px"></div>

        <div class="row">
          <div>
            <label>KM</label>
            <input name="km" placeholder="0">
          </div>
          <div>
            <label>Observação</label>
            <input name="obs" placeholder="Opcional">
          </div>
        </div>

        <div style="height:12px"></div>
        <button class="btn primary" type="submit">Abrir OS</button>
      </form>

      <div style="height:10px"></div>
      <div class="empty">
        Dica: se o cliente não existir ainda, cadastre em <b>Clientes</b> no menu.
      </div>
    </div>
  </div>
</div>
{% endblock %}
