<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Centro Automotivo - OS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{font-family:Arial;margin:30px;background:#f6f7fb}
    .box{max-width:520px;margin:auto;background:#fff;padding:18px;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
    input,button{width:100%;padding:12px;border-radius:8px;border:1px solid #d7dbe7;font-size:16px}
    button{background:#1b5cff;color:#fff;border:0;margin-top:10px;cursor:pointer}
    .msg{background:#ffe9c9;padding:10px;border-radius:8px;margin-bottom:10px}
    .top{font-weight:bold;margin-bottom:12px}
  </style>
</head>
<body>
  <div class="box">
    <div class="top">Centro Automotivo — Buscar por Placa</div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="msg">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    <form method="post" action="/buscar">
      <input name="placa" placeholder="Digite a placa (ex: ABC1D23)" autofocus>
      <button type="submit">Buscar</button>
    </form>
  </div>
</body>
</html>
