{% extends "base.html" %}
{% block content %}
<div class="panel">
  <div class="panel-h">
    <h1>Editar Cliente #{{ c.id }}</h1>
    <div class="badge">Atualizar dados</div>
  </div>

  <div class="panel-b">
    <div class="card">
      <form method="post" action="/clientes/atualizar">
        <input type="hidden" name="id" value="{{ c.id }}">

        <label>Nome</label>
        <input name="nome" value="{{ c.nome or '' }}" required>

        <div style="height:10px"></div>

        <div class="row">
          <div>
            <label>Telefone</label>
            <input name="telefone" value="{{ c.telefone or '' }}">
          </div>
          <div>
            <label>CPF</label>
            <input name="cpf" value="{{ c.cpf or '' }}">
          </div>
        </div>

        <div style="height:10px"></div>

        <label>Endereço</label>
        <input name="endereco" value="{{ c.endereco or '' }}">

        <div style="height:10px"></div>

        <label>Bairro</label>
        <input name="bairro" value="{{ c.bairro or '' }}">

        <div style="height:14px"></div>

        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <button class="btn primary" type="submit">Salvar</button>
          <a class="btn" href="/clientes">Voltar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
